name: Build and Test

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    if: "!github.event.pull_request.draft"
    strategy:
      matrix:
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Build & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build
        run: make build
